<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>贴吧签到助手</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <!-- 顶部标题栏 -->
    <header class="header">
      <h1 class="title">贴吧签到助手</h1>
      <div class="header-actions">
        <button id="btn-refresh" class="btn btn-icon" title="刷新列表">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
            <path d="M17.65 6.35A7.958 7.958 0 0012 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0112 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/>
          </svg>
        </button>
        <button id="btn-sign-all" class="btn btn-primary">一键签到</button>
      </div>
    </header>

    <!-- 状态栏 -->
    <div id="status-bar" class="status-bar">
      <span id="status-text">加载中...</span>
      <span id="sign-count" class="sign-count"></span>
    </div>

    <!-- 贴吧列表 -->
    <div id="forum-list" class="forum-list">
      <div class="loading-state">
        <div class="spinner"></div>
        <p>正在加载关注贴吧...</p>
      </div>
    </div>

    <!-- 底部信息 -->
    <footer class="footer">
      <span id="last-sign-time">暂无签到记录</span>
    </footer>
  </div>

  <script src="lib/tieba-api.js"></script>
  <script src="popup.js"></script>
</body>
</html>
